<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PatiDost | Randevular</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site.css">
</head>

<body>

    <!-- NAVBAR (DİĞER SAYFALARLA AYNI) -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">🐾 PatiDost</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="owners.html">Sahipler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="animals.html">Hayvanlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="veterinarians.html">Veterinerler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="appointments.html">Randevular</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">

        <div class="hero hero--page text-center">
            <h1 class="page-title">Randevular</h1>
            <p>Muayene randevularını yönetin</p>
        </div>

        <!-- CREATE -->
        <div class="card mb-4">
            <div class="card-body">
                <h5>Yeni Randevu</h5>

                <div class="row g-2">
                    <div class="col-md-4">
                        <select id="animalId" class="form-select"></select>
                    </div>

                    <div class="col-md-4">
                        <select id="vetId" class="form-select"></select>
                    </div>

                    <div class="col-md-4">
                        <input id="appointmentDate" type="datetime-local" class="form-control">
                    </div>

                    <div class="col-md-9 mt-2">
                        <input id="description" class="form-control" placeholder="Açıklama">
                    </div>

                    <div class="col-md-3 mt-2">
                        <button class="btn btn-warning w-100" onclick="addAppointment()">Ekle</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- LIST -->
        <div class="table-wrapper">
            <table class="table table-striped custom-table">
                <thead>
                    <tr>
                        <th>Hayvan</th>
                        <th>Veteriner</th>
                        <th>Tarih</th>
                        <th>Açıklama</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="appointmentTable"></tbody>
            </table>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editAppointmentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5>Randevu Güncelle</h5>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editAppointmentId">
                    <select id="editAnimalId" class="form-select mb-2"></select>
                    <select id="editVetId" class="form-select mb-2"></select>
                    <input id="editAppointmentDate" type="datetime-local" class="form-control mb-2">
                    <input id="editDescription" class="form-control">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button class="btn btn-warning" onclick="updateAppointment()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- DELETE MODAL -->
    <div class="modal fade" id="deleteAppointmentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-body">
                    Silmek istiyor musun?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Vazgeç</button>
                    <button class="btn btn-danger" onclick="confirmDeleteAppointment()">Sil</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/appointments.js"></script>

</body>
</html>
