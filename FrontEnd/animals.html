<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PatiDost | Hayvanlar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Ortak CSS -->
    <link rel="stylesheet" href="css/site.css">
</head>

<body>

    <!-- NAVBAR (INDEX & OWNERS İLE AYNI) -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">🐾 PatiDost</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">🏠 Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="owners.html">Sahipler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="animals.html">Hayvanlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="veterinarians.html">Veterinerler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="appointments.html">Randevular</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- SAYFA BAŞLIĞI (INDEX DÜZENİYLE AYNI) -->
        <div class="hero hero--page text-center">
            <h1 class="page-title">Hayvanlar</h1>
            <p>Kayıtlı hayvanları görüntüleyin ve yeni hayvan ekleyin...</p>
        </div>

        <!-- FORM -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="mb-3">Yeni Hayvan Ekle</h5>

                <div class="row g-2">
                    <div class="col-md-4">
                        <input id="name" class="form-control" placeholder="Hayvan Adı">
                    </div>

                    <div class="col-md-4">
                        <input id="type" class="form-control" placeholder="Tür (Kedi, Köpek...)">
                    </div>

                    <div class="col-md-4">
                        <input id="breed" class="form-control" placeholder="Cins">
                    </div>

                    <div class="col-md-3 mt-2">
                        <input id="age" type="number" class="form-control" placeholder="Yaş">
                    </div>

                    <div class="col-md-4 mt-2">
                        <select id="ownerId" class="form-select">
                            <option value="">Sahip Seç</option>
                        </select>
                    </div>

                    <div class="col-md-3 mt-2">
                        <button onclick="addAnimal()" class="btn btn-success w-100">
                            Hayvan Ekle
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-toolbar mb-2">
            <input type="text"
                   id="tableSearch"
                   class="form-control table-search"
                   placeholder="Listede ara..."
                   onkeyup="filterTable()" />
        </div>

        <!-- SCROLL -->
        <div class="table-wrapper">
            <table class="table table-striped custom-table">
                <thead>
                    <tr>
                        <th>Ad</th>
                        <th>Tür</th>
                        <th>Cins</th>
                        <th>Yaş</th>
                        <th>Sahip</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="animalTable">
                    <!-- JS dolduracak -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- UPDATE ANIMAL MODAL -->
    <div class="modal fade" id="editAnimalModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Hayvan Güncelle</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editAnimalId">

                    <input id="editName" class="form-control mb-2" placeholder="Ad">
                    <input id="editType" class="form-control mb-2" placeholder="Tür">
                    <input id="editBreed" class="form-control mb-2" placeholder="Cins">
                    <input id="editAge" type="number" class="form-control mb-2" placeholder="Yaş">

                    <select id="editOwnerId" class="form-select">
                        <option value="">Sahip Seç</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button class="btn btn-warning" onclick="updateAnimal()">Güncelle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- DELETE ANIMAL MODAL -->
    <div class="modal fade" id="deleteAnimalModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Silme Onayı</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Bu hayvanı silmek istediğine emin misin?
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Vazgeç</button>
                    <button class="btn btn-danger" onclick="confirmDeleteAnimal()">Sil</button>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/animals.js"></script>


</body>
</html>
